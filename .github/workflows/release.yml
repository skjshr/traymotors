name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - shell: pwsh
        run: ./scripts/package.ps1 -Configuration Release -Runtime win-x64
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/TrayMotors-win-x64.zip
