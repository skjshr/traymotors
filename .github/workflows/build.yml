name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test TrayMotors.slnx -c Release
      - shell: pwsh
        run: ./scripts/package.ps1 -Configuration Release -Runtime win-x64 -SkipTests
      - uses: actions/upload-artifact@v4
        with:
          name: TrayMotors-win-x64
          path: artifacts/TrayMotors-win-x64.zip
